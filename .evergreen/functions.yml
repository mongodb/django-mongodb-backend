functions:
  "setup":
    - command: git.get_project
      params:
        directory: src
    - command: subprocess.exec
      params:
        binary: bash
        working_dir: "src"
        add_expansions_to_env: true
        args:
          - ./.evergreen/setup.sh
    - command: expansions.update
      params:
        file: src/expansion.yml

  "bootstrap mongo-orchestration":
    - command: subprocess.exec
      params:
        binary: bash
        add_expansions_to_env: true
        args:
          - ${DRIVERS_TOOLS}/.evergreen/run-orchestration.sh
    - command: expansions.update
      params:
        file: mo-expansion.yml

  "run unit tests":
    - command: subprocess.exec
      type: test
      params:
        binary: bash
        working_dir: "src"
        include_expansions_in_env: ["DRIVERS_TOOLS", "MONGODB_URI"]
        args:
          - ./.evergreen/run-tests.sh

  "run performance tests":
    - command: subprocess.exec
      type: test
      params:
        binary: bash
        working_dir: "src"
        include_expansions_in_env: [ "DRIVERS_TOOLS", "MONGODB_URI" ]
        args:
          - ./.evergreen/run-perf-tests.sh

  "attach performance test results":
    - command: attach.results
      params:
        file_location: src/report.json

  "send dashboard data":
    - command: subprocess.exec
      params:
        binary: bash
        args:
          - .evergreen/perf-submission-setup.sh
        working_dir: src
        include_expansions_in_env: [
          "requester",
          "revision_order_id",
          "project_id",
          "version_id",
          "build_variant",
          "parsed_order_id",
          "task_name",
          "task_id",
          "execution",
          "is_mainline"
        ]
      type: test
    - command: expansions.update
      params:
        file: src/expansion.yml
    - command: subprocess.exec
      params:
        binary: bash
        args:
          - .evergreen/perf-submission.sh
        working_dir: src
        include_expansions_in_env: [
          "requester",
          "revision_order_id",
          "project_id",
          "version_id",
          "build_variant",
          "parsed_order_id",
          "task_name",
          "task_id",
          "execution",
          "is_mainline"
        ]
      type: test

  "teardown":
    - command: subprocess.exec
      params:
        binary: bash
        args:
          - ${DRIVERS_TOOLS}/.evergreen/teardown.sh
