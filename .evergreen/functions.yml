functions:
  "setup":
    - command: git.get_project
      params:
        directory: src
    - command: subprocess.exec
      params:
        binary: bash
        working_dir: "src"
        add_expansions_to_env: true
        args:
          - ./.evergreen/setup.sh
    - command: expansions.update
      params:
        file: src/expansion.yml

  "bootstrap mongo-orchestration":
    - command: subprocess.exec
      params:
        binary: bash
        add_expansions_to_env: true
        args:
          - ${DRIVERS_TOOLS}/.evergreen/run-orchestration.sh
    - command: expansions.update
      params:
        file: mo-expansion.yml

  "run unit tests":
    - command: subprocess.exec
      type: test
      params:
        binary: bash
        working_dir: "src"
        include_expansions_in_env: ["DRIVERS_TOOLS", "MONGODB_URI"]
        args:
          - ./.evergreen/run-tests.sh

  "teardown":
    - command: subprocess.exec
      params:
        binary: bash
        args:
          - ${DRIVERS_TOOLS}/.evergreen/teardown.sh

  # Encryption-specific functions
  "start csfle servers":
    - command: ec2.assume_role
      params:
        role_arn: ${aws_test_secrets_role}
    - command: subprocess.exec
      params:
        binary: bash
        include_expansions_in_env: [
          "AWS_SECRET_ACCESS_KEY",
          "AWS_ACCESS_KEY_ID",
          "AWS_SESSION_TOKEN",
        ]
        args:
          - ${DRIVERS_TOOLS}/.evergreen/csfle/setup.sh

  "teardown csfle":
    - command: subprocess.exec
      params:
        binary: bash
        args:
          - ${DRIVERS_TOOLS}/.evergreen/csfle/teardown.sh

  "run encryption tests":
    - command: subprocess.exec
      type: test
      params:
        binary: bash
        working_dir: "src"
        include_expansions_in_env: [
          "AWS_KMS_ARN",
          "DRIVERS_TOOLS",
          "MONGODB_URI",
          "DJANGO_SETTINGS_MODULE",
          "CRYPT_SHARED_LIB_PATH",
        ]
        args:
          - ./.evergreen/run-tests.sh
          - encryption

  # Performance test functions
  "run performance tests":
    - command: subprocess.exec
      type: test
      params:
        binary: bash
        working_dir: "src"
        include_expansions_in_env: [ "DRIVERS_TOOLS", "MONGODB_URI" ]
        args:
          - ./.evergreen/run-perf-tests.sh

  "attach performance test results":
    - command: attach.results
      params:
        file_location: src/report.json

  "send dashboard data":
    - command: subprocess.exec
      params:
        binary: bash
        args:
          - .evergreen/perf-submission-setup.sh
        working_dir: src
        include_expansions_in_env: [
          "requester",
          "revision_order_id",
          "project_id",
          "version_id",
          "build_variant",
          "parsed_order_id",
          "task_name",
          "task_id",
          "execution",
          "is_mainline"
        ]
      type: test
    - command: expansions.update
      params:
        file: src/expansion.yml
    - command: subprocess.exec
      params:
        binary: bash
        args:
          - .evergreen/perf-submission.sh
        working_dir: src
        include_expansions_in_env: [
          "requester",
          "revision_order_id",
          "project_id",
          "version_id",
          "build_variant",
          "parsed_order_id",
          "task_name",
          "task_id",
          "execution",
          "is_mainline"
        ]
      type: test
