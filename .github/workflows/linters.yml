name: Linters

on:
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Install Python dependencies
        run: |
          python -m pip install -U pip pre-commit
      - name: Run linters
        run: |
          pre-commit run --hook-stage=manual --all-files
    permissions:
        contents: read
  docs:
    name: Docs Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -e ".[docs]"
      - name: Build docs
        run: |
          cd docs
          make html
    permissions:
        contents: read
  # Run linkcheck nightly rather than on every PR: links change infrequently
  # and the check can be slow/flaky, so there's no need to block PRs on it.
  linkcheck:
    name: Docs Link Check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -e ".[docs]"
      - name: Check links
        run: |
          cd docs
          # Pages on mongodb.com/docs/ can temporarily disappear (e.g. during
          # doc rebuilds), so retry a few times before treating it as a real
          # failure.
          for attempt in 1 2 3; do
            make linkcheck && exit 0
            [ $attempt -lt 3 ] && sleep 60
          done
          exit 1
    permissions:
        contents: read
